<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | JobEase</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <style>
    :root {
     --primary: #9de8d5;
      --ink: #172033;
      --muted: #667085;
      --line: #e5e7eb;
      --bg: #f8fafc;
    }
    * { box-sizing: border-box; }
    body { margin: 0; color: var(--ink); background: var(--bg); font-family: Arial, Helvetica, sans-serif; }
    header { display: flex; align-items: center; justify-content: space-between; padding: 18px clamp(20px, 6vw, 82px); color: #fff; background: #172033; }
    .brand { color: #fff; font-size: 23px; font-weight: 800; text-decoration: none; }
    button { border: 1px solid rgba(255,255,255,.4); border-radius: 8px; padding: 9px 14px; color: #fff; background: transparent; cursor: pointer; font-weight: 700; }
    main { width: min(100% - 36px, 1120px); margin: 42px auto; }
    h1 { margin: 0 0 9px; font-size: clamp(30px, 5vw, 44px); letter-spacing: -1.5px; }
    .subtitle { margin: 0 0 30px; color: var(--muted); }
    .grid { display: grid; gap: 17px; grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .card { min-height: 142px; padding: 22px; border: 1px solid var(--line); border-radius: 13px; background: #fff; box-shadow: 0 7px 18px rgba(23,32,51,.04); }
    .card h2 { margin: 0 0 9px; font-size: 18px; }
    .card p { margin: 0; color: var(--muted); font-size: 14px; line-height: 1.6; }
    .tag { display: inline-block; margin-bottom: 13px; border-radius: 20px; padding: 6px 10px; color: #176e68; background: #e7f6d0; font-size: 12px; font-weight: 800; text-transform: uppercase; }
    .panel { margin-top: 27px; overflow: hidden; border: 1px solid var(--line); border-radius: 13px; background: #fff; }
    .panel-title { margin: 0; padding: 20px 21px 14px; font-size: 20px; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; text-align: left; }
    th, td { padding: 14px 17px; border-top: 1px solid var(--line); font-size: 13px; white-space: nowrap; }
    th { color: #475467; background: #f8fafc; font-size: 12px; text-transform: uppercase; }
    td { color: #344054; }
    .action { margin-right: 7px; border: 0; border-radius: 7px; padding: 8px 10px; color: #fff; background: #172033; cursor: pointer; font-size: 12px; font-weight: 700; }
    .danger { background: #b42318; }
    .act-menu { position: relative; display: inline-block; }
    .act-menu-btn { border: 0; border-radius: 7px; padding: 7px 13px; color: #fff; background: #172033; cursor: pointer; font-size: 12px; font-weight: 700; display: flex; align-items: center; gap: 5px; white-space: nowrap; }
    .act-menu-btn::after { content: "▾"; font-size: 10px; }
    .act-dropdown { display: none; position: absolute; right: 0; top: 110%; min-width: 150px; background: #fff; border: 1px solid #e5e7eb; border-radius: 9px; box-shadow: 0 8px 24px rgba(0,0,0,0.13); z-index: 99; overflow: hidden; }
    .act-menu:hover .act-dropdown,
    .act-menu:focus-within .act-dropdown { display: block; }
    .act-dropdown button { display: block; width: 100%; border: 0; padding: 10px 14px; text-align: left; background: #fff; font-size: 13px; font-weight: 600; cursor: pointer; color: #172033; }
    .act-dropdown button:hover { background: #f0f4ff; }
    .act-dropdown button.dd-danger { color: #b42318; }
    .act-dropdown button.dd-danger:hover { background: #fff5f5; }
    .act-dropdown button.dd-green { color: #15803d; }
    .act-dropdown button.dd-green:hover { background: #f0fdf4; }
    .act-dropdown button.dd-purple { color: #6366f1; }
    .act-dropdown button.dd-purple:hover { background: #f5f3ff; }
    .act-dropdown hr { margin: 3px 0; border: 0; border-top: 1px solid #f0f0f0; }
    .money { color: #15803d; font-size: 24px; font-weight: 800; }
    dialog { width: min(92vw, 590px); border: 0; border-radius: 14px; padding: 0; box-shadow: 0 20px 54px rgba(23,32,51,.2); }
    dialog::backdrop { background: rgba(23,32,51,.48); }
    .modal-head { display: flex; align-items: center; justify-content: space-between; padding: 17px 20px; color: #fff; background: #172033; }
    .modal-head h2 { margin: 0; font-size: 19px; }
    .modal-head button { border: 0; padding: 2px 6px; font-size: 21px; }
    .modal-body { padding: 20px; }
    .detail-grid { display: grid; gap: 12px; grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .detail { padding: 12px; border-radius: 8px; background: #f8fafc; }
    .detail strong { display: block; margin-bottom: 5px; color: #475467; font-size: 11px; text-transform: uppercase; }
    .comments { margin: 18px 0 0; padding: 0; list-style: none; }
    .comments li { margin-top: 9px; padding: 11px 12px; border-left: 3px solid var(--primary); color: #475467; background: #effbf6; font-size: 13px; line-height: 1.5; }
    .customer-layout { display: grid; gap: 20px; margin-top: 27px; grid-template-columns: minmax(0, 620px); align-items: start; }
    .customer-layout .panel { margin-top: 0; }
    input, select, textarea { width: 100%; border: 1px solid var(--line); border-radius: 8px; outline: 0; padding: 11px 12px; color: var(--ink); background: #fff; font: inherit; }
    input:focus, select:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(86,169,145,.14); }
    textarea { min-height: 86px; resize: vertical; }
    .job-form { display: grid; gap: 12px; padding: 0 20px 20px; }
    .job-form label { display: grid; gap: 6px; color: #475467; font-size: 12px; font-weight: 800; }
    .primary-action { border: 0; border-radius: 8px; padding: 11px 14px; color: #fff; background: var(--primary); cursor: pointer; font-weight: 800; }
    .primary-action:hover { background: #aee453; }
    .form-success { display: none; margin: 0; color: #15803d; font-size: 13px; font-weight: 700; }
    .posted-jobs { margin-top: 20px; }
    .quick-panel { margin-top: 20px; }
    .quick-intro { padding: 0 20px 17px; color: var(--muted); font-size: 14px; line-height: 1.6; }
    .quick-grid { display: grid; gap: 12px; padding: 0 20px 20px; grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .quick-grid label { display: grid; gap: 6px; color: #475467; font-size: 12px; font-weight: 800; }
    .full { grid-column: 1 / -1; }
    .price-box { display: none; padding: 14px; border: 1px solid #d6ed9e; border-radius: 9px; color: #41650a; background: #f5ffe2; font-size: 14px; line-height: 1.6; }
    .price-box strong { display: block; color: #214c45; font-size: 22px; }
    .booking-status { display: none; margin: 0 20px 20px; padding: 18px; border: 1px solid #bfdbfe; border-radius: 10px; background: #eff6ff; }
    .booking-status h3 { margin: 0 0 7px; font-size: 18px; }
    .booking-status p { margin: 5px 0; color: #475467; font-size: 14px; line-height: 1.5; }
    .loader { width: 30px; height: 30px; margin-bottom: 10px; border: 4px solid #bfdbfe; border-top-color: #2563eb; border-radius: 50%; animation: spin .8s linear infinite; }
    .otp { display: inline-block; margin-top: 9px; border-radius: 7px; padding: 7px 11px; color: #fff; background: #172033; font-size: 20px; font-weight: 800; letter-spacing: 4px; }
    .start-work { display: none; margin-top: 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .star-row { display:flex; gap:3px; margin:5px 0; }
    .star-btn { background:none; border:none; font-size:22px; cursor:pointer; color:#d1d5db; padding:0; line-height:1; transition:color .1s; }
    .star-btn.on, .star-btn:hover, .star-btn:hover ~ .star-btn { color:#f59e0b; }
    .star-row:hover .star-btn { color:#f59e0b; }
    .star-row .star-btn:hover ~ .star-btn { color:#d1d5db; }
    .rating-form { margin-top:8px; padding:10px; background:#fffbeb; border:1px solid #fde68a; border-radius:8px; }
    .rating-form textarea { width:100%; border:1px solid #e5e7eb; border-radius:6px; padding:7px; font:inherit; font-size:12px; resize:vertical; min-height:52px; margin-top:6px; }
    .rating-done { display:inline-block; margin-top:6px; padding:4px 10px; background:#fef3c7; border-radius:6px; color:#92400e; font-weight:700; font-size:13px; }
    .search-dots { display:flex; gap:5px; align-items:center; }
    .search-dots span { width:7px; height:7px; border-radius:50%; background:#2563eb; animation:dotbounce .8s infinite alternate; }
    .search-dots span:nth-child(2){ animation-delay:.18s; }
    .search-dots span:nth-child(3){ animation-delay:.36s; }
    @keyframes dotbounce{ to{ transform:translateY(-7px); opacity:.35; } }
    .status-cell { white-space:normal; min-width:160px; line-height:1.6; }
    .worker-assigned-card { margin-top:6px; padding:8px 10px; border-radius:8px; background:#f0fdf4; border:1px solid #bbf7d0; }
    .otp-badge { display:inline-block; padding:5px 13px; border-radius:7px; background:#172033; color:#fff; font-size:17px; font-weight:800; letter-spacing:4px; font-family:monospace; }
    .ts { font-size:11px; color:var(--muted); margin-top:3px; }
    .dash-tabs { display: flex; gap: 6px; margin-top: 27px; border-bottom: 2px solid var(--line); }
    .dash-tab { border: 1px solid var(--line); border-bottom: 3px solid transparent; border-radius: 9px 9px 0 0; padding: 11px 22px; color: var(--muted); background: #f8fafc; cursor: pointer; font-size: 14px; font-weight: 700; margin-bottom: -2px; transition: color .15s, background .15s; }
    .dash-tab.active { border-color: var(--primary); border-bottom-color: #fff; color: var(--ink); background: #fff; }
    .dash-tab:hover:not(.active) { color: var(--ink); background: #fff; }
    .tab-panel > .panel { margin-top: 0; border-radius: 0 13px 13px 13px; }
    .otp-input { width: 110px; border: 1px solid var(--line); border-radius: 6px; padding: 7px 10px; font-size: 15px; letter-spacing: 3px; text-align: center; font-family: monospace; color: var(--ink); background: #fff; outline: 0; }
    .otp-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(86,169,145,.14); }
    .work-timer { font-size: 22px; font-weight: 800; color: #2563eb; font-variant-numeric: tabular-nums; letter-spacing: 1px; display: block; margin-bottom: 6px; }
    .otp-badge { display: inline-block; padding: 5px 12px; border-radius: 7px; background: #172033; color: #fff; font-size: 18px; font-weight: 800; letter-spacing: 4px; font-family: monospace; }
    .pay-options { display: grid; gap: 14px; grid-template-columns: 1fr 1fr; margin-top: 16px; }
    .pay-card { border: 2px solid var(--line); border-radius: 12px; padding: 20px 14px; text-align: center; cursor: pointer; background: #fff; font-weight: 700; font-size: 14px; transition: border-color .15s, background .15s; }
    .pay-card:hover { border-color: var(--primary); background: #f5ffe2; }
    .pay-card.selected { border-color: #15803d; background: #f0fdf4; }
    /* ── Admin dashboard ─────────────────────────────────────────────── */
    .adm-stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 14px; margin: 18px 0; }
    .adm-stat-card { background: #fff; border: 1px solid var(--line); border-radius: 12px; padding: 16px 18px; display: flex; align-items: center; gap: 14px; box-shadow: 0 1px 4px rgba(0,0,0,.05); transition: box-shadow .15s; }
    .adm-stat-card:hover { box-shadow: 0 4px 14px rgba(0,0,0,.1); }
    .adm-stat-card.adm-stat-highlight { border-color: #86efac; background: #f0fdf4; }
    .adm-stat-icon { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
    .adm-stat-val { font-size: 22px; font-weight: 800; color: var(--ink); line-height: 1.1; }
    .adm-stat-lbl { font-size: 12px; color: var(--muted); font-weight: 600; margin-top: 2px; }
    .adm-alert { display: flex; align-items: center; justify-content: space-between; gap: 12px; background: #fffbeb; border: 1px solid #fde68a; border-radius: 10px; padding: 12px 16px; margin-bottom: 4px; font-size: 14px; }
    .adm-badge { display: inline-block; padding: 3px 9px; border-radius: 6px; font-size: 11px; font-weight: 700; white-space: nowrap; }
    .adm-badge.badge-ok       { background: #dcfce7; color: #15803d; }
    .adm-badge.badge-warn     { background: #fef3c7; color: #92400e; }
    .adm-badge.badge-inactive { background: #fee2e2; color: #b91c1c; }
    .adm-badge.badge-busy     { background: #dbeafe; color: #1d4ed8; }
    .adm-badge.badge-info     { background: #e0f2fe; color: #0369a1; }
    .adm-badge.badge-purple   { background: #ede9fe; color: #7c3aed; }
    .adm-badge.badge-muted    { background: #f1f5f9; color: #64748b; }
    .adm-tab-count { font-size: 11px; background: #e2e8f0; color: #475569; border-radius: 9px; padding: 1px 6px; margin-left: 3px; font-weight: 700; }
    .adm-tab-badge { font-size: 11px; background: #ef4444; color: #fff; border-radius: 9px; padding: 1px 6px; margin-left: 2px; font-weight: 700; }
    .adm-search { width: 100%; max-width: 340px; border: 1px solid var(--line); border-radius: 8px; padding: 9px 14px; font-size: 14px; color: var(--ink); background: #fff; outline: 0; display: block; }
    .adm-search:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(86,169,145,.14); }
    .adm-subfilter { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .adm-filter-btn { border: 1px solid var(--line); border-radius: 7px; padding: 6px 14px; background: #f8fafc; color: var(--muted); font-size: 13px; font-weight: 700; cursor: pointer; transition: all .15s; }
    .adm-filter-btn:hover { background: #fff; color: var(--ink); border-color: var(--primary); }
    .adm-filter-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    @media (max-width: 720px) { .grid { grid-template-columns: 1fr; } .detail-grid { grid-template-columns: 1fr; } .pay-options { grid-template-columns: 1fr; } .adm-stats-grid { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 520px) { .quick-grid { grid-template-columns: 1fr; } .full { grid-column: auto; } .dash-tab { padding: 9px 13px; font-size: 13px; } .adm-stats-grid { grid-template-columns: 1fr; } }
  </style>
  <link rel="stylesheet" href="futuristic-ui.css">
</head>
<body>
  <header>
    <a class="brand" href="index.html">JobEase</a>
    <button id="logout" type="button">Log out</button>
  </header>
  <main>
    <span class="tag" id="role-tag"></span>
    <h1 id="title"></h1>
    <p class="subtitle" id="subtitle"></p>
    <section class="grid" id="cards"></section>
    <section id="role-content"></section>
  </main>
  <dialog id="worker-modal">
    <div class="modal-head">
      <h2>Worker details</h2>
      <button id="close-modal" type="button" aria-label="Close">×</button>
    </div>
    <div class="modal-body" id="worker-details"></div>
  </dialog>
  <dialog id="payment-modal">
    <div class="modal-head">
      <h2>Confirm Payment</h2>
      <button id="close-payment-modal" type="button" aria-label="Close">×</button>
    </div>
    <div class="modal-body" id="payment-modal-body"></div>
  </dialog>
  <dialog id="assign-modal">
    <div class="modal-head">
      <h2>Assign worker to job</h2>
      <button id="close-assign-modal" type="button" aria-label="Close">×</button>
    </div>
    <div class="modal-body" id="assign-modal-body"></div>
    <div class="modal-body" style="padding-top:0; display:flex; justify-content:flex-end; gap:10px;">
      <button class="action" id="assign-job-submit" type="button">Assign</button>
    </div>
  </dialog>
  <script>
    if (window.location.protocol === "file:") {
      window.location.replace("http://localhost:3000/dashboard.html");
    }
    const views = {
      customer: {
        title: "Customer dashboard",
        subtitle: "Book a service instantly or post a job — we connect you with the right professional.",
        cards: []
      },
      worker: {
        title: "Worker dashboard",
        subtitle: "Manage jobs and grow your service profile.",
        cards: [
          ["Job requests", "Review new requests from nearby customers."],
          ["My schedule", "Keep track of your accepted and upcoming work."],
          ["Worker profile", "Update your skills, location, and service details."]
        ]
      },
      admin: {
        title: "Admin dashboard",
        subtitle: "Monitor platform activity and manage JobEase access.",
        cards: [
          ["Manage users", "Review customer and worker accounts."],
          ["Worker approvals", "Check worker registrations and profile details."],
          ["Service reports", "View booking activity and platform summaries."]
        ]
      }
    };

    const backendBase = location.protocol === "file:" ? "http://localhost:3000" : "";
    const role = localStorage.getItem("jobeaseRole");
    const token = localStorage.getItem("jobeaseToken");
    if (!token) {
      window.location.replace("login.html");
    } else {
      fetch(`${backendBase}/api/auth/me`, { headers: { Authorization: `Bearer ${token}` } })
        .then((response) => {
          if (!response.ok) throw new Error("Session expired");
          return response.json();
        })
        .then(({ user }) => {
          if (user.role !== role) window.location.replace("login.html");
        })
        .catch(() => {
          localStorage.removeItem("jobeaseToken");
          localStorage.removeItem("jobeaseRole");
          localStorage.removeItem("jobeaseUser");
          window.location.replace("login.html");
        });
    }

    let adminWorkers = [];
    let adminJobs = [];
    async function renderAdmin(activeTab = "overview") {
      const token = localStorage.getItem("jobeaseToken");
      const hdr = { Authorization: `Bearer ${token}` };
      const [workersRes, jobsRes, usersRes, qbRes] = await Promise.all([
        fetch(`${backendBase}/api/workers`,       { headers: hdr }),
        fetch(`${backendBase}/api/jobs`,          { headers: hdr }),
        fetch(`${backendBase}/api/users`,         { headers: hdr }),
        fetch(`${backendBase}/api/quick-bookings`,{ headers: hdr })
      ]);
      if (!workersRes.ok || !jobsRes.ok || !usersRes.ok) {
        document.getElementById("role-content").innerHTML = `<section class="panel"><h2 class="panel-title">Unable to load admin information</h2></section>`;
        return;
      }
      adminWorkers = (await workersRes.json()).workers || [];
      adminJobs    = (await jobsRes.json()).jobs || [];
      const adminCustomers = (await usersRes.json()).users || [];
      const adminQB = qbRes.ok ? ((await qbRes.json()).bookings || []) : [];

      // ── derived stats ──────────────────────────────────────────────────────
      const totalRevenue = adminJobs.filter(j => /^Payment/i.test(j.status))
        .reduce((s, j) => s + Math.max(0, Number(j.amount) - Number(j.commission || 0)), 0);
      const qbRevenue = adminQB.filter(q => /^Payment/i.test(q.status))
        .reduce((s, q) => s + Math.max(0, Number(q.starting_charge) - Number(q.commission || 0)), 0);
      const activeJobs = adminJobs.filter(j => ["Worker Accepted","Work Started","Worker Notified","Worker assigned"].includes(j.status));
      const pendingJobs = adminJobs.filter(j => j.status === "Pending Assignment" || j.status === "Finding a worker");

      // ── status badge helper ────────────────────────────────────────────────
      function workerBadge(w) {
        if (!w.active) return `<span class="adm-badge badge-inactive">Inactive</span>`;
        if (!w.verified) return `<span class="adm-badge badge-warn">⏳ Unverified</span>`;
        if (w.available) return `<span class="adm-badge badge-ok">✓ Available</span>`;
        return `<span class="adm-badge badge-busy">Busy</span>`;
      }
      function jobBadge(status) {
        const s = status || "";
        if (/^Payment/i.test(s)) return `<span class="adm-badge badge-ok">${s}</span>`;
        if (s === "Work Started")  return `<span class="adm-badge badge-busy">Work Started</span>`;
        if (s === "Worker Accepted" || s === "Worker assigned") return `<span class="adm-badge badge-info">Assigned</span>`;
        if (s === "Work Completed") return `<span class="adm-badge badge-purple">Completed</span>`;
        if (s === "Worker Notified") return `<span class="adm-badge badge-warn">Notified</span>`;
        return `<span class="adm-badge badge-muted">${s}</span>`;
      }

      // ── tab definitions ────────────────────────────────────────────────────
      const unverifiedCount = adminWorkers.filter(w => w.active && !w.verified).length;
      const tabs = [
        { id: "overview",  label: "Overview" },
        { id: "workers",   label: `Workers <span class="adm-tab-count">${adminWorkers.length}</span>${unverifiedCount ? ` <span class="adm-tab-badge">${unverifiedCount}</span>` : ""}` },
        { id: "customers", label: `Customers <span class="adm-tab-count">${adminCustomers.length}</span>` },
        { id: "jobs",      label: `Jobs <span class="adm-tab-count">${adminJobs.length}</span>` },
        { id: "quickbook", label: `Quick Bookings <span class="adm-tab-count">${adminQB.length}</span>` }
      ];

      // ── OVERVIEW ──────────────────────────────────────────────────────────
      const overviewHTML = `
        <div class="adm-stats-grid">
          <div class="adm-stat-card">
            <div class="adm-stat-icon" style="background:#eff6ff;color:#2563eb;">👷</div>
            <div>
              <div class="adm-stat-val">${adminWorkers.length}</div>
              <div class="adm-stat-lbl">Total Workers</div>
            </div>
          </div>
          <div class="adm-stat-card">
            <div class="adm-stat-icon" style="background:#f0fdf4;color:#15803d;">✓</div>
            <div>
              <div class="adm-stat-val">${adminWorkers.filter(w=>w.active&&w.verified).length}</div>
              <div class="adm-stat-lbl">Active & Verified</div>
            </div>
          </div>
          <div class="adm-stat-card">
            <div class="adm-stat-icon" style="background:#fffbeb;color:#b45309;">⏳</div>
            <div>
              <div class="adm-stat-val">${unverifiedCount}</div>
              <div class="adm-stat-lbl">Awaiting Verification</div>
            </div>
          </div>
          <div class="adm-stat-card">
            <div class="adm-stat-icon" style="background:#fdf4ff;color:#9333ea;">👥</div>
            <div>
              <div class="adm-stat-val">${adminCustomers.length}</div>
              <div class="adm-stat-lbl">Customers</div>
            </div>
          </div>
          <div class="adm-stat-card">
            <div class="adm-stat-icon" style="background:#fff1f2;color:#e11d48;">📋</div>
            <div>
              <div class="adm-stat-val">${adminJobs.length}</div>
              <div class="adm-stat-lbl">Total Jobs</div>
            </div>

      // ── WORKERS ───────────────────────────────────────────────────────────
      const workersHTML = `

            <button class="adm-filter-btn"         data-wf="unverified" onclick="adminSetWorkerFilter(this,'unverified')">Unverified</button>
            <button class="adm-filter-btn"         data-wf="inactive" onclick="adminSetWorkerFilter(this,'inactive')">Inactive</button>
          </div>
        </div>
        <section class="panel" style="margin-top:0;">
          <div class="table-wrap">
            <table id="adm-workers-table">
              <thead><tr><th>Name</th><th>Service</th><th>City</th><th>Rating</th><th>Jobs Done</th><th>Status</th><th>Actions</th></tr></thead>
              <tbody>${adminWorkers.map(w=>`
                <tr data-wname="${w.name.toLowerCase()}" data-wservice="${(w.service||"").toLowerCase()}" data-wcity="${(w.city||"").toLowerCase()}" data-wactive="${w.active}" data-wverified="${w.verified}" style="${!w.active?'opacity:0.6;':''}">
                  <td><strong>${w.name}</strong><div class="ts">${w.email||""}</div></td>
                  <td>${w.service}</td>
                  <td>${w.city}</td>
                  <td><span style="color:#f59e0b;font-weight:700;">★ ${w.rating}</span></td>
                  <td>${w.completedJobs}</td>
                  <td>${workerBadge(w)}</td>
                  <td>
                    <div class="act-menu">
                      <button class="act-menu-btn">Actions ▾</button>
                      <div class="act-dropdown">
                        <button onclick="showWorker('${w.id}')">👁 View Details</button>
                        <button ${w.available&&pendingJobs.length?`onclick="showAssignModal('${w.id}')"`:"disabled style='opacity:.45;cursor:not-allowed;'"}>📋 Assign Job</button>

                        ${!w.verified?`<button class="dd-green" onclick="verifyWorker('${w.id}','${w.name}')">✓ Verify Worker</button>`:`<span style="display:block;padding:8px 14px;font-size:12px;color:#15803d;font-weight:600;">✓ Verified</span>`}

                </tr>`).join("")||`<tr><td colspan="7" style="text-align:center;color:var(--muted);">No workers found.</td></tr>`}
              </tbody>
            </table>
          </div>
        </section>`;

      // ── CUSTOMERS ─────────────────────────────────────────────────────────
      const customersHTML = `
        <input id="adm-cust-search" class="adm-search" placeholder="Search customers by name or email…" oninput="adminFilterCustomers()" style="margin-bottom:12px;"/>
        <section class="panel" style="margin-top:0;">
          <div class="table-wrap">
            <table id="adm-customers-table">
              <thead><tr><th>Name</th><th>Email</th><th>Jobs</th><th>Status</th><th>Joined</th><th>Action</th></tr></thead>
              <tbody>${adminCustomers.length?adminCustomers.map(c=>`
                <tr data-cname="${c.name.toLowerCase()}" data-cemail="${c.email.toLowerCase()}">
                  <td><strong>${c.name}</strong></td>
                  <td>${c.email}</td>
                  <td>${c.jobsCount}</td>
                  <td>${c.active?`<span class="adm-badge badge-ok">Active</span>`:`<span class="adm-badge badge-inactive">Inactive</span>`}</td>
                  <td class="ts">${fmtDate(c.createdAt)}</td>
                  <td><button class="action" style="background:#6366f1;padding:6px 12px;" onclick="resetUserPassword('${c.id}','${c.name}')">🔑 Reset Pwd</button></td>
                </tr>`).join(""):`<tr><td colspan="6" style="text-align:center;color:var(--muted);">No customers found.</td></tr>`}
              </tbody>
            </table>
          </div>
        </section>`;

      // ── JOBS ──────────────────────────────────────────────────────────────
      function jobRows(filter) {
        const filtered = filter === "all" ? adminJobs
          : filter === "pending"  ? adminJobs.filter(j=>j.status==="Pending Assignment"||j.status==="Finding a worker"||j.status==="Worker Notified")
          : filter === "active"   ? adminJobs.filter(j=>["Worker Accepted","Work Started","Worker assigned"].includes(j.status))
          : filter === "done"     ? adminJobs.filter(j=>j.status==="Work Completed")
          : adminJobs.filter(j=>/^Payment/i.test(j.status));
        return filtered.length ? filtered.map(j=>`
          <tr>
            <td><strong>${j.title}</strong><div class="ts">${j.id}</div></td>
            <td>${j.category}</td>
            <td>${j.location}</td>
            <td>${j.customerName||"—"}</td>
            <td>${j.workerName||`<span style="color:var(--muted);">Unassigned</span>`}</td>
            <td>${jobBadge(j.status)}</td>
            <td>₹${Number(j.amount).toLocaleString("en-IN")}</td>
          </tr>`).join("")
          : `<tr><td colspan="7" style="text-align:center;color:var(--muted);">No jobs in this category.</td></tr>`;
      }
      const jobsHTML = `
        <div class="adm-subfilter" id="adm-job-filters">
          ${[["all","All"],["pending","Pending"],["active","Active"],["done","Completed"],["paid","Paid"]].map(([v,l],i)=>`
            <button class="adm-filter-btn${i===0?' active':''}" data-jf="${v}" onclick="adminSetJobFilter(this,'${v}')">${l}</button>`).join("")}
        </div>
        <section class="panel" style="margin-top:8px;">
          <div class="table-wrap">
            <table id="adm-jobs-table">
              <thead><tr><th>Title</th><th>Service</th><th>Location</th><th>Customer</th><th>Worker</th><th>Status</th><th>Amount</th></tr></thead>
              <tbody id="adm-jobs-tbody">${jobRows("all")}</tbody>
            </table>
          </div>
        </section>`;

      // ── QUICK BOOKINGS ────────────────────────────────────────────────────
      function qbBadge(s) {
        if (/^Payment/i.test(s)) return `<span class="adm-badge badge-ok">${s}</span>`;
        if (s==="Work started")  return `<span class="adm-badge badge-busy">Work Started</span>`;
        if (s==="Worker assigned") return `<span class="adm-badge badge-info">Assigned</span>`;
        if (s==="Work completed") return `<span class="adm-badge badge-purple">Completed</span>`;
        if (s==="Worker Notified") return `<span class="adm-badge badge-warn">Notified</span>`;
        if (s==="Cancelled") return `<span class="adm-badge badge-inactive">Cancelled</span>`;
        return `<span class="adm-badge badge-muted">${s}</span>`;
      }
      const quickBookHTML = `
        <section class="panel" style="margin-top:0;">
          <div class="table-wrap">
            <table>
              <thead><tr><th>Service</th><th>Location</th><th>Customer</th><th>Worker</th><th>Status</th><th>Charge</th><th>Posted</th><th>Action</th></tr></thead>
              <tbody>${adminQB.length?adminQB.map(b=>`
                <tr>
                  <td>${b.service}</td>
                  <td>${b.location}</td>
                  <td>${b.customerName||"—"}</td>
                  <td>${b.workerName||`<span style="color:var(--muted);">None</span>`}</td>
                  <td>${qbBadge(b.status)}</td>
                  <td>₹${Number(b.starting_charge).toLocaleString("en-IN")}</td>
                  <td class="ts">${fmtDate(b.created_at)}</td>
                  <td>${["Searching","Worker Notified","Worker assigned"].includes(b.status)?`<button class="action danger" style="padding:5px 10px;font-size:12px;" onclick="adminCancelQB('${b.id}')">Cancel</button>`:"—"}</td>
                </tr>`).join(""):`<tr><td colspan="8" style="text-align:center;color:var(--muted);">No quick bookings yet.</td></tr>`}
              </tbody>
            </table>
          </div>
        </section>`;

      // ── RENDER ────────────────────────────────────────────────────────────
      document.getElementById("role-content").innerHTML = `
        <nav class="dash-tabs" id="adm-tabs" style="margin-top:18px;">
          ${tabs.map(t=>`<button class="dash-tab${activeTab===t.id?' active':''}" data-atab="${t.id}">${t.label}</button>`).join("")}
        </nav>
        <div id="adm-tab-overview"  style="display:${activeTab==='overview' ?'block':'none'};">${overviewHTML}</div>
        <div id="adm-tab-workers"   style="display:${activeTab==='workers'  ?'block':'none'};">${workersHTML}</div>
        <div id="adm-tab-customers" style="display:${activeTab==='customers'?'block':'none'};">${customersHTML}</div>
        <div id="adm-tab-jobs"      style="display:${activeTab==='jobs'     ?'block':'none'};">${jobsHTML}</div>
        <div id="adm-tab-quickbook" style="display:${activeTab==='quickbook'?'block':'none'};">${quickBookHTML}</div>`;

      document.getElementById("adm-tabs").addEventListener("click", e => {
        const btn = e.target.closest(".dash-tab[data-atab]");
        if (!btn) return;
        switchAdminTab(btn.dataset.atab);
      });
    }

    function switchAdminTab(tabId) {
      ["overview","workers","customers","jobs","quickbook"].forEach(t => {
        const el = document.getElementById(`adm-tab-${t}`);
        if (el) el.style.display = t === tabId ? "block" : "none";
        const btn = document.querySelector(`.dash-tab[data-atab="${t}"]`);
        if (btn) btn.classList.toggle("active", t === tabId);
      });
    }

    function adminFilterWorkers() {
      const q = (document.getElementById("adm-worker-search")?.value || "").toLowerCase();
      const activeFilter = document.querySelector(".adm-filter-btn.active[data-wf]")?.dataset.wf || "all";
      document.querySelectorAll("#adm-workers-table tbody tr[data-wname]").forEach(row => {
        const matchQ = !q || row.dataset.wname.includes(q) || row.dataset.wservice.includes(q) || row.dataset.wcity.includes(q);
        const active = row.dataset.wactive === "1" || row.dataset.wactive === "true";
        const verified = row.dataset.wverified === "1" || row.dataset.wverified === "true";
        const matchF = activeFilter === "all" || (activeFilter === "active" && active && verified)
          || (activeFilter === "unverified" && active && !verified) || (activeFilter === "inactive" && !active);
        row.style.display = matchQ && matchF ? "" : "none";
      });
    }

    function adminSetWorkerFilter(btn, filter) {
      document.querySelectorAll(".adm-filter-btn[data-wf]").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      adminFilterWorkers();
    }

    function adminFilterCustomers() {
      const q = (document.getElementById("adm-cust-search")?.value || "").toLowerCase();
      document.querySelectorAll("#adm-customers-table tbody tr[data-cname]").forEach(row => {
        const match = !q || row.dataset.cname.includes(q) || row.dataset.cemail.includes(q);
        row.style.display = match ? "" : "none";
      });
    }

    function adminSetJobFilter(btn, filter) {
      document.querySelectorAll(".adm-filter-btn[data-jf]").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      const tbody = document.getElementById("adm-jobs-tbody");
      if (!tbody) return;
      tbody.querySelectorAll("tr").forEach(r => r.style.display = "");
      if (filter === "all") return;
      tbody.querySelectorAll("tr[style]").forEach(r => r.style.display = "");
      // re-render from data
      const filtered = filter === "pending"  ? adminJobs.filter(j=>j.status==="Pending Assignment"||j.status==="Finding a worker"||j.status==="Worker Notified")
        : filter === "active"   ? adminJobs.filter(j=>["Worker Accepted","Work Started","Worker assigned"].includes(j.status))
        : filter === "done"     ? adminJobs.filter(j=>j.status==="Work Completed")
        : adminJobs.filter(j=>/^Payment/i.test(j.status));
      function jb(s){const st=s||"";if(/^Payment/i.test(st))return`<span class="adm-badge badge-ok">${st}</span>`;if(st==="Work Started")return`<span class="adm-badge badge-busy">Work Started</span>`;if(st==="Worker Accepted"||st==="Worker assigned")return`<span class="adm-badge badge-info">Assigned</span>`;if(st==="Work Completed")return`<span class="adm-badge badge-purple">Completed</span>`;if(st==="Worker Notified")return`<span class="adm-badge badge-warn">Notified</span>`;return`<span class="adm-badge badge-muted">${st}</span>`;}
      tbody.innerHTML = filtered.length ? filtered.map(j=>`<tr><td><strong>${j.title}</strong><div class="ts">${j.id}</div></td><td>${j.category}</td><td>${j.location}</td><td>${j.customerName||"—"}</td><td>${j.workerName||`<span style="color:var(--muted);">Unassigned</span>`}</td><td>${jb(j.status)}</td><td>₹${Number(j.amount).toLocaleString("en-IN")}</td></tr>`).join("")
        : `<tr><td colspan="7" style="text-align:center;color:var(--muted);">No jobs in this category.</td></tr>`;
    }

    async function adminCancelQB(bookingId) {
      if (!confirm("Cancel this quick booking?")) return;
      try {
        const res = await fetch(`${backendBase}/api/quick-bookings/${bookingId}/cancel`, {
          method: "PATCH", headers: { Authorization: `Bearer ${localStorage.getItem("jobeaseToken")}` }
        });
        const result = await res.json();
        if (!res.ok) throw new Error(result.error);
        renderAdmin("quickbook");
      } catch (e) {
        alert(e.message || "Unable to cancel booking.");
      }
    }

    async function showAssignModal(workerId) {
      const worker = adminWorkers.find((item) => item.id === workerId);
      if (!worker) return;
      const pendingJobs = adminJobs.filter((job) => !job.worker_id && job.status !== "Completed");
      document.getElementById("assign-modal-body").innerHTML = `
        <div class="detail-grid">
          <div class="detail"><strong>Worker</strong>${worker.name}</div>
          <div class="detail"><strong>Service</strong>${worker.service}</div>
          <div class="detail"><strong>City</strong>${worker.city}</div>
          <div class="detail"><strong>Available</strong>${worker.available ? "Yes" : "No"}</div>
        </div>
        <label style="display:block; margin-top:18px; font-weight:700; color:#475467; font-size:12px; text-transform:uppercase;">Select job to assign</label>
        <select id="assign-job-select" style="width:100%; border:1px solid var(--line); border-radius:8px; padding:10px; margin-top:8px; font:inherit;">
          ${pendingJobs.length ? pendingJobs.map((job) => `<option value="${job.id}">${job.id} – ${job.title} (${job.category})</option>`).join("") : `<option disabled>No jobs available for assignment</option>`}
        </select>
      `;
      document.getElementById("assign-job-submit").onclick = async () => {
        const selectedJobId = document.getElementById("assign-job-select").value;
        if (!selectedJobId) return;
        await assignJobToWorker(workerId, selectedJobId);
      };
      document.getElementById("assign-modal").showModal();
    }

    async function assignJobToWorker(workerId, jobId) {
      try {
        const response = await fetch(`${backendBase}/api/jobs/${jobId}/assign`, {
          method: "PATCH",
          headers: { "Content-Type": "application/json", Authorization: `Bearer ${localStorage.getItem("jobeaseToken")}` },
          body: JSON.stringify({ workerId })
        });
        const result = await response.json();
        if (!response.ok) throw new Error(result.error);
        alert(result.message || "Worker assigned successfully.");
        document.getElementById("assign-modal").close();
        renderAdmin("workers");
      } catch (error) {
        alert(error.message || "Unable to assign worker.");
      }
    }

    function showWorker(id) {
      const worker = (adminWorkers.length ? adminWorkers : getWorkers()).find((item) => item.id === id);
      if (!worker) return;
      document.getElementById("worker-details").innerHTML = `
        <div class="detail-grid">
          <div class="detail"><strong>Name</strong>${worker.name}</div>
          <div class="detail"><strong>Service</strong>${worker.service}</div>
          <div class="detail"><strong>Phone</strong>${worker.phone}</div>
          <div class="detail"><strong>City</strong>${worker.city}</div>
          <div class="detail"><strong>Experience</strong>${worker.experience}</div>
          <div class="detail"><strong>Rating</strong>★ ${worker.rating} (${worker.completedJobs ?? worker.jobs} jobs)</div>
        </div>
        <h3>Customer comments</h3>
        <ul class="comments">${(worker.reviews || worker.comments || []).map((review) => `<li>${review.comment || review}</li>`).join("") || "<li>No customer comments yet.</li>"}</ul>`;
      document.getElementById("worker-modal").showModal();
    }

    async function resetUserPassword(userId, userName) {
      const newPassword = prompt(`Set new password for "${userName}":\n(minimum 6 characters)`);
      if (!newPassword) return;
      if (newPassword.length < 6) { alert("Password must be at least 6 characters."); return; }
      try {
        const res = await fetch(`${backendBase}/api/users/${userId}/password`, {
          method: "PATCH",
          headers: { "Content-Type": "application/json", Authorization: `Bearer ${localStorage.getItem("jobeaseToken")}` },
          body: JSON.stringify({ newPassword })
        });
        const result = await res.json();
        if (!res.ok) throw new Error(result.error);
        alert(`Password for "${userName}" updated successfully.`);
      } catch (e) {
        alert(e.message || "Unable to update password.");
      }
    }

    async function verifyWorker(workerId, workerName) {
      if (!confirm(`Verify ${workerName}? They will be able to receive job assignments.`)) return;
      try {
        const res = await fetch(`${backendBase}/api/workers/${workerId}/verify`, {
          method: "PATCH",
          headers: { Authorization: `Bearer ${localStorage.getItem("jobeaseToken")}` }
        });
        const result = await res.json();
        if (!res.ok) throw new Error(result.error);
        renderAdmin("workers");
      } catch (e) {
        alert(e.message || "Unable to verify worker.");
      }
    }

    async function toggleWorkerStatus(workerId, makeActive) {
      const action = makeActive ? "activate" : "deactivate";
      if (!confirm(`Are you sure you want to ${action} this worker?`)) return;
      try {
        const res = await fetch(`${backendBase}/api/workers/${workerId}/status`, {
          method: "PATCH",
          headers: { "Content-Type": "application/json", Authorization: `Bearer ${localStorage.getItem("jobeaseToken")}` },
          body: JSON.stringify({ active: makeActive })
        });
        const result = await res.json();
        if (!res.ok) throw new Error(result.error);
        renderAdmin("workers");
      } catch (e) {
        alert(e.message || `Unable to ${action} worker.`);
      }
    }

    async function deleteWorker(id) {
      if (!confirm("Delete this worker account?")) return;
      const response = await fetch(`${backendBase}/api/workers/${id}`, { method: "DELETE", headers: { Authorization: `Bearer ${localStorage.getItem("jobeaseToken")}` } });
      if (!response.ok) {
        const result = await response.json();
        alert(result.error || "Unable to delete worker.");
        return;
      }
      renderAdmin("workers");
    }

    async function renderWorker(activeTab = "jobs") {
      try {
        const [profileRes, jobsRes, quickRes] = await Promise.all([
          fetch(`${backendBase}/api/worker/profile`, { headers: { Authorization: `Bearer ${localStorage.getItem("jobeaseToken")}` } }),
          fetch(`${backendBase}/api/jobs`,            { headers: { Authorization: `Bearer ${localStorage.getItem("jobeaseToken")}` } }),
          fetch(`${backendBase}/api/quick-bookings`,  { headers: { Authorization: `Bearer ${localStorage.getItem("jobeaseToken")}` } })
        ]);
        if (!profileRes.ok) throw new Error("Failed to load profile");
        const { profile }       = await profileRes.json();
        const { jobs = [] }     = jobsRes.ok ? await jobsRes.json() : {};
        const { bookings = [] } = quickRes.ok ? await quickRes.json() : {};

        const paidJobs    = jobs.filter(j => /^Payment/i.test(j.status));
        const workerShare = paidJobs.reduce((s, j) => s + Math.max(0, Number(j.amount) - Number(j.commission || 0)), 0);
        const activeJob   = jobs.find(j => ["Worker Accepted","Work Started","Work Completed"].includes(j.status));
        const pendingCount= jobs.filter(j => j.status === "Worker Accepted").length;

        document.getElementById("cards").innerHTML = `
          <article class="card" style="cursor:pointer;" onclick="switchWorkerTab('profile')">
            <h2>${profile.name}</h2>
            <p>${profile.service} · ${profile.city}</p>
            <p style="margin-top:8px;font-size:12px;font-weight:700;color:${profile.verified ? '#15803d' : '#b45309'}">
              ${profile.verified ? '✓ Verified' : '⏳ Pending verification'}
            </p>
            <p class="ts" style="margin-top:6px;">Tap to view profile</p>
          </article>
          <article class="card"><h2>Rating</h2><p class="money">⭐ ${profile.rating}</p><p>${profile.completedJobs} jobs done</p></article>
          <article class="card" style="cursor:pointer;" onclick="switchWorkerTab('income')">
            <h2>Your income</h2><p class="money">₹${workerShare.toLocaleString("en-IN")}</p><p style="font-size:12px;">After 10% platform fee</p>
          </article>`;

        const jobRows = jobs.length ? jobs.map(job => {
          let action = `<span style="color:var(--muted);font-size:12px;">—</span>`;
          if (job.status === "Worker Notified" || job.status === "Assigned") {
            action = `<span style="color:#b45309;font-size:12px;">Awaiting response…</span>`;
          } else if (job.status === "Worker Accepted") {
            action = `

        // Tab switching

          startJobTimer(j.id, new Date(j.work_started_at));
        });

          startJobTimer("q" + b.id, new Date(b.started_at));
        });

        console.error(e);

    function switchWorkerTab(tabId) {
      ["jobs","quick","income","profile"].forEach(t => {
        const el = document.getElementById(`wtab-${t}`);
        if (el) el.style.display = t === tabId ? "block" : "none";
        const btn = document.querySelector(`.dash-tab[data-wtab="${t}"]`);
        if (btn) btn.classList.toggle("active", t === tabId);
      });
    }

    async function verifyJobOtp(event, jobId) {
      event.preventDefault();
      const btn = event.target.querySelector("button");
      const otp = event.target.querySelector("input").value.trim();
      btn.disabled = true; btn.textContent = "Verifying…";
      try {
        const res = await fetch(`${backendBase}/api/jobs/${jobId}/verify-otp`, {
          method: "POST",
          headers: { "Content-Type": "application/json", Authorization: `Bearer ${localStorage.getItem("jobeaseToken")}` },
          body: JSON.stringify({ otp })
        });
        const result = await res.json();
        if (!res.ok) throw new Error(result.error);
        renderWorker();
      } catch (e) {
        alert(e.message || "OTP verification failed.");
        btn.disabled = false; btn.textContent = "Verify OTP";
      }
    }

    function startJobTimer(jobId, startTime) {
      const start = new Date(startTime).getTime();
      function tick() {
        const el = document.getElementById("timer-" + jobId);
        if (!el) return;
        const s = Math.floor((Date.now() - start) / 1000);
        const h = String(Math.floor(s / 3600)).padStart(2, "0");
        const m = String(Math.floor((s % 3600) / 60)).padStart(2, "0");
        const sec = String(s % 60).padStart(2, "0");
        el.textContent = `${h}:${m}:${sec}`;
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }

      document.getElementById("payment-modal-body").innerHTML = `

    async function confirmWorkerPayment(jobId, method, card) {
      document.querySelectorAll(".pay-card").forEach(c => c.classList.remove("selected"));
      card.classList.add("selected");
      if (!confirm(`Confirm ${method.toUpperCase()} payment received?`)) { card.classList.remove("selected"); return; }
      try {
        const res = await fetch(`${backendBase}/api/jobs/${jobId}/payment`, {
          method: "POST",
          headers: { "Content-Type": "application/json", Authorization: `Bearer ${localStorage.getItem("jobeaseToken")}` },
          body: JSON.stringify({ method })
        });
        const result = await res.json();
        if (!res.ok) throw new Error(result.error);
        document.getElementById("payment-modal").close();
        alert(`Payment of ₹${Number(result.job?.amount || 0).toLocaleString("en-IN")} via ${method.toUpperCase()} confirmed. Income updated.`);
        renderWorker();
      } catch (e) {
        alert(e.message || "Unable to record payment.");
        card.classList.remove("selected");
      }
    }

    async function completeJob(jobId) {
      return workerCompleteJob(jobId);
    }

    async function getCustomerJobs() {
      try {
        const response = await fetch(`${backendBase}/api/jobs`, { headers: { Authorization: `Bearer ${localStorage.getItem("jobeaseToken")}` } });
        if (!response.ok) throw new Error("Failed to load jobs");
        const result = await response.json();
        return result.jobs || [];
      } catch (e) {
        console.error("Error fetching jobs:", e);
        return [];
      }
    }

    function fmtDate(ts) {
      if (!ts) return "";
      return new Date(ts).toLocaleString("en-IN", { day:"2-digit", month:"short", year:"numeric", hour:"2-digit", minute:"2-digit", hour12:true });
    }

    async function renderCustomerJobs() {
      const jobs = await getCustomerJobs();
      const tbody = document.getElementById("customer-jobs");
      if (!tbody) return;
      tbody.innerHTML = jobs.length ? jobs.map(job => {
        let statusCell;
        if (job.status === "Pending Assignment" || job.status === "Worker Notified") {
          statusCell = `<div class="search-dots"><span></span><span></span><span></span></div>
            <div style="color:#2563eb;font-weight:700;margin-top:5px;">Searching for worker…</div>
            <div class="ts">Posted: ${fmtDate(job.created_at)}</div>`;
        } else if (job.status === "Worker Accepted") {
          statusCell = `<div style="color:#15803d;font-weight:700;">Worker Assigned</div>
            ${job.workerName ? `<div class="worker-assigned-card">
              <div style="font-weight:800;font-size:13px;">${job.workerName}</div>
              ${job.workerService ? `<div class="ts">${job.workerService}</div>` : ""}
              ${job.workerPhone ? `<div class="ts">📞 ${job.workerPhone}</div>` : ""}
            </div>` : ""}
            <div style="margin-top:7px;"><small class="ts" style="font-weight:700;">Share OTP on arrival:</small></div>
            <span class="otp-badge">${job.otp || "—"}</span>
            <div class="ts">Posted: ${fmtDate(job.created_at)}</div>`;
        } else if (job.status === "Work Started") {
          statusCell = `<div style="color:#2563eb;font-weight:700;">Work in Progress</div>
            <div class="ts">Started: ${fmtDate(job.work_started_at)}</div>
            <div class="ts">Posted: ${fmtDate(job.created_at)}</div>`;
        } else if (job.status === "Work Completed") {
          statusCell = `<div style="color:#b45309;font-weight:700;">Work Completed</div>
            <div class="ts">Completed: ${fmtDate(job.completed_at)}</div>
            <div class="ts">Awaiting payment from worker</div>`;
        } else if (/^Payment/i.test(job.status)) {
          statusCell = `<div style="color:#15803d;font-weight:700;">✓ ${job.status}</div>
            <div class="ts">Paid: ${fmtDate(job.completed_at)}</div>`;
        } else {
          statusCell = `<div>${job.status}</div><div class="ts">${fmtDate(job.created_at)}</div>`;
        }
        let actionCell;
        if (/^Payment/i.test(job.status)) {
          if (job.reviewed) {
            actionCell = `<span class="rating-done">✓ Rated</span>`;
          } else {
            actionCell = `
              <div class="rating-form">
                <div style="font-size:12px;font-weight:700;color:#92400e;margin-bottom:3px;">Rate this job</div>
                <div class="star-row" id="stars-${job.id}">
                  ${[1,2,3,4,5].map(n=>`<button class="star-btn" data-job="${job.id}" data-val="${n}" onclick="selectStar('${job.id}',${n})">★</button>`).join("")}
                </div>
                <textarea id="comment-${job.id}" placeholder="Leave a comment (optional)…"></textarea>
                <button class="action" style="margin-top:6px;background:#f59e0b;" onclick="submitJobReview('${job.id}')">Submit Rating</button>
              </div>`;
          }
        } else if (job.status === "Work Started" || job.status === "Work Completed") {
          actionCell = `<span style="color:var(--muted);font-size:12px;">—</span>`;
        } else {
          actionCell = `<button class="action danger" onclick="deleteCustomerJob('${job.id}')">Delete</button>`;
        }
        const sched = job.scheduledAt || job.scheduled_at;
        return `<tr>
          <td>
            <strong>${job.title}</strong>
            ${sched ? `<div style="margin-top:3px;display:inline-block;font-size:11px;background:#fef3c7;color:#92400e;padding:2px 8px;border-radius:5px;font-weight:700;">📅 ${fmtDate(sched)}</div>` : `<div class="ts">ASAP</div>`}
          </td>
          <td>${job.category}</td>
          <td>${job.location}</td>
          <td class="status-cell">${statusCell}</td>
          <td>${actionCell}</td>
        </tr>`;
      }).join("") : `<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:24px;">No requests posted yet.</td></tr>`;

      // Auto-refresh while any job is in searching state
      const hasSearching = jobs.some(j => j.status === "Worker Notified" || j.status === "Pending Assignment");
      if (hasSearching && !window._custPoller) {
        window._custPoller = setInterval(async () => {
          const fresh = await getCustomerJobs();
          const stillSearching = fresh.some(j => j.status === "Worker Notified" || j.status === "Pending Assignment");
          if (document.querySelector(".dash-tab[data-tab='track']")?.classList.contains("active")) renderCustomerJobs();
          if (!stillSearching) { clearInterval(window._custPoller); window._custPoller = null; }
        }, 6000);
      }
    }

    async function showPaymentModal(jobId, amount) {
      const method = prompt("Select payment method:\n1. Cash\n2. UPI\n\nEnter 1 or 2:");

      const paymentMethod = method === "1" ? "cash" : method === "2" ? "upi" : null;

        alert("Invalid selection");
        return;
      }
      try {
        const response = await fetch(`${backendBase}/api/jobs/${jobId}/payment`, {
          method: "POST",
          headers: { "Content-Type": "application/json", Authorization: `Bearer ${localStorage.getItem("jobeaseToken")}` },

        });

        if (!response.ok) throw new Error(result.error);
        alert(`Payment recorded via ${paymentMethod.toUpperCase()}. Amount: ₹${amount}`);

        alert("Error recording payment: " + e.message);

    async function assignQuickWorker(service, location, details) {
      const status = document.getElementById("quick-status");
      const response = await fetch(`${backendBase}/api/quick-bookings`, {
        method: "POST",
        headers: { "Content-Type": "application/json", Authorization: `Bearer ${localStorage.getItem("jobeaseToken")}` },
        body: JSON.stringify({ service, location, details, startingCharge: quickCharges[service] })
      });
      const result = await response.json();
      if (!response.ok) {
        status.innerHTML = `<h3>Unable to create booking</h3><p>${result.error}</p>`;
        return;
      }
      const booking = result.booking;
      localStorage.setItem("jobeaseQuickBooking", JSON.stringify(booking));
      if (booking.status === "No Worker Available") {
        status.innerHTML = `<h3 style="color:#b45309;">No worker found nearby</h3><p>No ${service} professional is available in <strong>${location}</strong> right now. Please try again later.</p>`;
        return;
      }
      // Worker Notified — waiting for worker to accept
      status.innerHTML = `
        <div class="search-dots" style="margin-bottom:10px;"><span></span><span></span><span></span></div>
        <h3 style="color:#2563eb;">Notifying a worker…</h3>
        <p>A nearby <strong>${service}</strong> professional has been notified for <strong>${location}</strong>.</p>
        <p style="font-size:13px;color:var(--muted);">The worker must accept your request. This page will update automatically.</p>`;
      // Poll every 5 seconds until worker accepts
      const bookingId = booking.id;
      const qbPoller = setInterval(async () => {
        const res = await fetch(`${backendBase}/api/quick-bookings`, { headers: { Authorization: `Bearer ${localStorage.getItem("jobeaseToken")}` } });
        const data = res.ok ? await res.json() : {};
        const updated = (data.bookings || []).find(b => b.id === bookingId);
        if (!updated) return;
        if (updated.status === "Worker assigned") {
          clearInterval(qbPoller);
          status.innerHTML = `
            <h3 style="color:#15803d;">✓ Worker Assigned</h3>
            <p><strong>${updated.workerName || "Your worker"}</strong> has accepted your booking and is on the way.</p>
            <p>Service: ${service}<br>Location: ${location}<br>Estimated arrival: <strong>45 minutes</strong></p>
            <p>Share this OTP only after the worker arrives:</p>
            <span class="otp">${updated.otp}</span>
            <p style="font-size:13px;">The worker must enter this OTP before work can start.</p>`;
        } else if (updated.status === "No Worker Available") {
          clearInterval(qbPoller);
          status.innerHTML = `<h3 style="color:#b45309;">No worker accepted</h3><p>No nearby ${service} professional accepted the request. Please try again.</p>`;
        }
      }, 5000);
    }

    async function deleteCustomerJob(jobId) {
      if (!jobId || !confirm("Delete this posted job?")) return;
      const response = await fetch(`/api/jobs/${jobId}`, {
        method: "DELETE",
        headers: { Authorization: `Bearer ${localStorage.getItem("jobeaseToken")}` }
      });
      const result = await response.json().catch(() => ({}));
      if (!response.ok) {
        alert(result.error || "Unable to delete job.");
        return;
      }
      localStorage.setItem("jobeaseCustomerJobs", JSON.stringify(
        JSON.parse(localStorage.getItem("jobeaseCustomerJobs") || "[]").filter((job) => job.id !== jobId)
      ));

    function enhanceCustomerJobDeleteButtons() {
      const headings = Array.from(document.querySelectorAll("h2, .panel-title"));
      const jobsPanel = headings.find((heading) => /posted jobs|job assignments/i.test(heading.textContent))?.closest("section, .panel, div");
      if (!jobsPanel || jobsPanel.dataset.deleteEnhanced === "true") return;
      const table = jobsPanel.querySelector("table");
      if (!table) return;
      const headerRow = table.querySelector("thead tr");
      if (headerRow && !/action/i.test(headerRow.textContent)) headerRow.insertAdjacentHTML("beforeend", "<th>Action</th>");
      const savedJobs = JSON.parse(localStorage.getItem("jobeaseCustomerJobs") || "[]");
      table.querySelectorAll("tbody tr").forEach((row, index) => {
        if (row.querySelector("[data-delete-job]")) return;
        const firstCell = row.querySelector("td");
        const jobId = firstCell?.textContent.trim().match(/JOB-[A-Za-z0-9]+/)?.[0] || savedJobs[index]?.id;
        if (!jobId) return;
        const cells = row.querySelectorAll("td");
        const actionCell = cells[cells.length - 1];
        if (actionCell && actionCell.textContent.trim() === "-") {
          actionCell.innerHTML = `<button class="action danger" data-delete-job="${jobId}" type="button">Delete</button>`;
        } else {
          row.insertAdjacentHTML("beforeend", `<td><button class="action danger" data-delete-job="${jobId}" type="button">Delete</button></td>`);
        }
      });
      jobsPanel.dataset.deleteEnhanced = "true";
    }

        fetch(`${backendBase}/api/worker/quick-booking-notifications`, { headers: { Authorization: `Bearer ${token}` } })
      ]);

      const qbResult  = qbRes.ok  ? await qbRes.json().catch(() => ({}))  : {};

    async function findWorkerForAssignment(row) {
      const cells = Array.from(row.querySelectorAll("td")).map((cell) => cell.textContent.trim());
      const [name, service, city] = cells;
      const token = localStorage.getItem("jobeaseToken");
      if (!token || !name) return null;

      const response = await fetch("/api/workers", {
        headers: { Authorization: `Bearer ${token}` }
      });
      const result = await response.json();
      if (!response.ok) throw new Error(result.error || "Unable to load workers.");

      return result.workers.find((worker) =>
        worker.name === name &&
        worker.service === service &&
        (!city || worker.city === city)
      ) || null;
    }

        let parent = button.parentElement;

          if (parent.querySelector("select") && /assign worker to job/i.test(parent.textContent)) {
            assignmentPanel = parent;
            break;

          parent = parent.parentElement;

            .map((item) => item.textContent.trim())
            .join(" ");
          const workerResponse = await fetch("/api/workers", { headers: { Authorization: `Bearer ${token}` } });
          const workerResult = await workerResponse.json();
          jobeasePendingAssignmentWorker = workerResult.workers?.find((worker) =>
            details.includes(worker.name) && details.includes(worker.service)
          );
        }
        if (!jobeasePendingAssignmentWorker?.id) throw new Error("Please close this popup and click Assign again for the worker.");

        button.disabled = true;
        button.textContent = "Assigning...";
        const response = await fetch("/api/jobs/assign", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`
          },
          body: JSON.stringify({ jobId: selectedJobId, workerId: jobeasePendingAssignmentWorker.id })
        });
        const result = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(result.error || "Unable to assign job.");

        alert("Worker assigned successfully.");
        window.location.reload();
      } catch (assignmentError) {
        alert(assignmentError.message || "Unable to assign job.");
        button.disabled = false;
        button.textContent = "Assign";
      }
    }, true);
  </script>
  <script src="chatbot.js"></script>
</body>
</html>
