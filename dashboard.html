<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | JobEase</title>
  <style>
    :root {
      --primary: #f97316;
      --ink: #172033;
      --muted: #667085;
      --line: #e5e7eb;
      --bg: #f8fafc;
    }
    * { box-sizing: border-box; }
    body { margin: 0; color: var(--ink); background: var(--bg); font-family: Arial, Helvetica, sans-serif; }
    header { display: flex; align-items: center; justify-content: space-between; padding: 18px clamp(20px, 6vw, 82px); color: #fff; background: #172033; }
    .brand { color: #fff; font-size: 23px; font-weight: 800; text-decoration: none; }
    button { border: 1px solid rgba(255,255,255,.4); border-radius: 8px; padding: 9px 14px; color: #fff; background: transparent; cursor: pointer; font-weight: 700; }
    main { width: min(100% - 36px, 1120px); margin: 42px auto; }
    h1 { margin: 0 0 9px; font-size: clamp(30px, 5vw, 44px); letter-spacing: -1.5px; }
    .subtitle { margin: 0 0 30px; color: var(--muted); }
    .grid { display: grid; gap: 17px; grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .card { min-height: 142px; padding: 22px; border: 1px solid var(--line); border-radius: 13px; background: #fff; box-shadow: 0 7px 18px rgba(23,32,51,.04); }
    .card h2 { margin: 0 0 9px; font-size: 18px; }
    .card p { margin: 0; color: var(--muted); font-size: 14px; line-height: 1.6; }
    .tag { display: inline-block; margin-bottom: 13px; border-radius: 20px; padding: 6px 10px; color: #c2410c; background: #fff7ed; font-size: 12px; font-weight: 800; text-transform: uppercase; }
    .panel { margin-top: 27px; overflow: hidden; border: 1px solid var(--line); border-radius: 13px; background: #fff; }
    .panel-title { margin: 0; padding: 20px 21px 14px; font-size: 20px; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; text-align: left; }
    th, td { padding: 14px 17px; border-top: 1px solid var(--line); font-size: 13px; white-space: nowrap; }
    th { color: #475467; background: #f8fafc; font-size: 12px; text-transform: uppercase; }
    td { color: #344054; }
    .action { margin-right: 7px; border: 0; border-radius: 7px; padding: 8px 10px; color: #fff; background: #172033; cursor: pointer; font-size: 12px; font-weight: 700; }
    .danger { background: #b42318; }
    .money { color: #15803d; font-size: 24px; font-weight: 800; }
    dialog { width: min(92vw, 590px); border: 0; border-radius: 14px; padding: 0; box-shadow: 0 20px 54px rgba(23,32,51,.2); }
    dialog::backdrop { background: rgba(23,32,51,.48); }
    .modal-head { display: flex; align-items: center; justify-content: space-between; padding: 17px 20px; color: #fff; background: #172033; }
    .modal-head h2 { margin: 0; font-size: 19px; }
    .modal-head button { border: 0; padding: 2px 6px; font-size: 21px; }
    .modal-body { padding: 20px; }
    .detail-grid { display: grid; gap: 12px; grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .detail { padding: 12px; border-radius: 8px; background: #f8fafc; }
    .detail strong { display: block; margin-bottom: 5px; color: #475467; font-size: 11px; text-transform: uppercase; }
    .comments { margin: 18px 0 0; padding: 0; list-style: none; }
    .comments li { margin-top: 9px; padding: 11px 12px; border-left: 3px solid var(--primary); color: #475467; background: #fff7ed; font-size: 13px; line-height: 1.5; }
    .customer-layout { display: grid; gap: 20px; margin-top: 27px; grid-template-columns: minmax(0, 620px); align-items: start; }
    .customer-layout .panel { margin-top: 0; }
    input, select, textarea { width: 100%; border: 1px solid var(--line); border-radius: 8px; outline: 0; padding: 11px 12px; color: var(--ink); background: #fff; font: inherit; }
    input:focus, select:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(249,115,22,.12); }
    textarea { min-height: 86px; resize: vertical; }
    .job-form { display: grid; gap: 12px; padding: 0 20px 20px; }
    .job-form label { display: grid; gap: 6px; color: #475467; font-size: 12px; font-weight: 800; }
    .primary-action { border: 0; border-radius: 8px; padding: 11px 14px; color: #fff; background: var(--primary); cursor: pointer; font-weight: 800; }
    .primary-action:hover { background: #ea580c; }
    .form-success { display: none; margin: 0; color: #15803d; font-size: 13px; font-weight: 700; }
    .posted-jobs { margin-top: 20px; }
    .quick-panel { margin-top: 20px; }
    .quick-intro { padding: 0 20px 17px; color: var(--muted); font-size: 14px; line-height: 1.6; }
    .quick-grid { display: grid; gap: 12px; padding: 0 20px 20px; grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .quick-grid label { display: grid; gap: 6px; color: #475467; font-size: 12px; font-weight: 800; }
    .full { grid-column: 1 / -1; }
    .price-box { display: none; padding: 14px; border: 1px solid #fed7aa; border-radius: 9px; color: #9a3412; background: #fff7ed; font-size: 14px; line-height: 1.6; }
    .price-box strong { display: block; color: #7c2d12; font-size: 22px; }
    .booking-status { display: none; margin: 0 20px 20px; padding: 18px; border: 1px solid #bfdbfe; border-radius: 10px; background: #eff6ff; }
    .booking-status h3 { margin: 0 0 7px; font-size: 18px; }
    .booking-status p { margin: 5px 0; color: #475467; font-size: 14px; line-height: 1.5; }
    .loader { width: 30px; height: 30px; margin-bottom: 10px; border: 4px solid #bfdbfe; border-top-color: #2563eb; border-radius: 50%; animation: spin .8s linear infinite; }
    .otp { display: inline-block; margin-top: 9px; border-radius: 7px; padding: 7px 11px; color: #fff; background: #172033; font-size: 20px; font-weight: 800; letter-spacing: 4px; }
    .start-work { display: none; margin-top: 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 720px) { .grid { grid-template-columns: 1fr; } .detail-grid { grid-template-columns: 1fr; } }
    @media (max-width: 860px) { .customer-layout { grid-template-columns: 1fr; } }
    @media (max-width: 520px) { .quick-grid { grid-template-columns: 1fr; } .full { grid-column: auto; } }
  </style>
</head>
<body>
  <header>
    <a class="brand" href="index.html">JobEase</a>
    <button id="logout" type="button">Log out</button>
  </header>
  <main>
    <span class="tag" id="role-tag"></span>
    <h1 id="title"></h1>
    <p class="subtitle" id="subtitle"></p>
    <section class="grid" id="cards"></section>
    <section id="role-content"></section>
  </main>
  <dialog id="worker-modal">
    <div class="modal-head">
      <h2>Worker details</h2>
      <button id="close-modal" type="button" aria-label="Close">×</button>
    </div>
    <div class="modal-body" id="worker-details"></div>
  </dialog>
  <script>
    const views = {
      customer: {
        title: "Customer dashboard",
        subtitle: "Post your service request and we will assign a suitable worker automatically.",
        cards: [
          ["Post a job", "Tell us what service you need and where the work is located."],
          ["Automatic assignment", "A suitable worker is selected without exposing personal worker details."],
          ["Track requests", "Review your posted jobs and current assignment status."]
        ]
      },
      worker: {
        title: "Worker dashboard",
        subtitle: "Manage jobs and grow your service profile.",
        cards: [
          ["Job requests", "Review new requests from nearby customers."],
          ["My schedule", "Keep track of your accepted and upcoming work."],
          ["Worker profile", "Update your skills, location, and service details."]
        ]
      },
      admin: {
        title: "Admin dashboard",
        subtitle: "Monitor platform activity and manage JobEase access.",
        cards: [
          ["Manage users", "Review customer and worker accounts."],
          ["Worker approvals", "Check worker registrations and profile details."],
          ["Service reports", "View booking activity and platform summaries."]
        ]
      }
    };

    const role = localStorage.getItem("jobeaseRole");
    const defaultWorkers = [
      { id: 1, name: "Ravi Kumar", service: "Electrician", phone: "+91 98765 43210", city: "Delhi", experience: "5 years", rating: 4.8, jobs: 42, comments: ["Excellent work and arrived on time.", "Fixed the issue quickly."] },
      { id: 2, name: "Anita Sharma", service: "Cleaner", phone: "+91 98111 22334", city: "Noida", experience: "3 years", rating: 4.6, jobs: 31, comments: ["Very professional service.", "Would book again."] },
      { id: 3, name: "Mohit Verma", service: "Plumber", phone: "+91 98990 11223", city: "Gurugram", experience: "6 years", rating: 4.7, jobs: 56, comments: ["Helpful and knowledgeable.", "Resolved the leak properly."] }
    ];
    const workerJobs = [
      { id: "JOB-1042", customer: "Neha Gupta", service: "Wiring repair", date: "30 May 2026", status: "Completed", amount: 1200, commission: 120 },
      { id: "JOB-1043", customer: "Amit Singh", service: "Fan installation", date: "31 May 2026", status: "Accepted", amount: 850, commission: 85 },
      { id: "JOB-1044", customer: "Karan Mehta", service: "Switchboard repair", date: "2 Jun 2026", status: "Pending", amount: 650, commission: 65 },
      { id: "JOB-1039", customer: "Priya Jain", service: "Light installation", date: "27 May 2026", status: "Completed", amount: 900, commission: 90 }
    ];

    function getWorkers() {
      const saved = localStorage.getItem("jobeaseWorkers");
      if (saved) return JSON.parse(saved);
      localStorage.setItem("jobeaseWorkers", JSON.stringify(defaultWorkers));
      return defaultWorkers;
    }

    function renderAdmin() {
      const workers = getWorkers();
      document.getElementById("role-content").innerHTML = `
        <section class="panel">
          <h2 class="panel-title">Registered workers</h2>
          <div class="table-wrap">
            <table>
              <thead><tr><th>Name</th><th>Service</th><th>City</th><th>Rating</th><th>Jobs</th><th>Actions</th></tr></thead>
              <tbody>
                ${workers.map((worker) => `
                  <tr>
                    <td>${worker.name}</td><td>${worker.service}</td><td>${worker.city}</td>
                    <td>★ ${worker.rating}</td><td>${worker.jobs}</td>
                    <td><button class="action" onclick="showWorker(${worker.id})">Details</button><button class="action danger" onclick="deleteWorker(${worker.id})">Delete</button></td>
                  </tr>`).join("") || `<tr><td colspan="6">No registered workers.</td></tr>`}
              </tbody>
            </table>
          </div>
        </section>`;
    }

    function showWorker(id) {
      const worker = getWorkers().find((item) => item.id === id);
      if (!worker) return;
      document.getElementById("worker-details").innerHTML = `
        <div class="detail-grid">
          <div class="detail"><strong>Name</strong>${worker.name}</div>
          <div class="detail"><strong>Service</strong>${worker.service}</div>
          <div class="detail"><strong>Phone</strong>${worker.phone}</div>
          <div class="detail"><strong>City</strong>${worker.city}</div>
          <div class="detail"><strong>Experience</strong>${worker.experience}</div>
          <div class="detail"><strong>Rating</strong>★ ${worker.rating} (${worker.jobs} jobs)</div>
        </div>
        <h3>Customer comments</h3>
        <ul class="comments">${worker.comments.map((comment) => `<li>${comment}</li>`).join("")}</ul>`;
      document.getElementById("worker-modal").showModal();
    }

    function deleteWorker(id) {
      if (!confirm("Delete this worker account?")) return;
      localStorage.setItem("jobeaseWorkers", JSON.stringify(getWorkers().filter((worker) => worker.id !== id)));
      renderAdmin();
    }

    function renderWorker() {
      const completed = workerJobs.filter((job) => job.status === "Completed");
      const earnings = completed.reduce((total, job) => total + job.amount, 0);
      const commission = completed.reduce((total, job) => total + job.commission, 0);
      document.getElementById("cards").innerHTML = `
        <article class="card"><h2>Total earnings</h2><p class="money">₹${earnings.toLocaleString("en-IN")}</p><p>Completed job value</p></article>
        <article class="card"><h2>Commission</h2><p class="money">₹${commission.toLocaleString("en-IN")}</p><p>Platform commission deducted</p></article>
        <article class="card"><h2>Net earnings</h2><p class="money">₹${(earnings - commission).toLocaleString("en-IN")}</p><p>Amount after commission</p></article>`;
      document.getElementById("role-content").innerHTML = `
        <section class="panel">
          <h2 class="panel-title">Job details</h2>
          <div class="table-wrap">
            <table>
              <thead><tr><th>Job ID</th><th>Customer</th><th>Service</th><th>Date</th><th>Status</th><th>Job value</th><th>Commission</th><th>Net earning</th></tr></thead>
              <tbody>${workerJobs.map((job) => `<tr><td>${job.id}</td><td>${job.customer}</td><td>${job.service}</td><td>${job.date}</td><td>${job.status}</td><td>₹${job.amount}</td><td>₹${job.commission}</td><td>₹${job.amount - job.commission}</td></tr>`).join("")}</tbody>
            </table>
          </div>
        </section>`;
    }

    function getCustomerJobs() {
      return JSON.parse(localStorage.getItem("jobeaseCustomerJobs") || "[]");
    }

    function renderCustomerJobs() {
      const jobs = getCustomerJobs();
      document.getElementById("customer-jobs").innerHTML = jobs.length
        ? jobs.map((job) => `<tr><td>${job.title}</td><td>${job.category}</td><td>${job.location}</td><td>₹${job.budget}</td><td>${job.status}</td></tr>`).join("")
        : `<tr><td colspan="5">No jobs posted yet.</td></tr>`;
    }

    function renderCustomer() {
      document.getElementById("role-content").innerHTML = `
        <div class="customer-layout">
          <section class="panel">
            <h2 class="panel-title">Post a job</h2>
            <form class="job-form" id="customer-job-form">
              <label>Job title<input name="title" required placeholder="Example: Fix kitchen tap"></label>
              <label>Service category
                <select name="category" id="job-service-category" required>
                  <option value="">Select service</option>
                </select>
              </label>
              <label>Location<input name="location" required placeholder="Enter job location"></label>
              <label>Budget (₹)<input name="budget" required min="1" type="number" placeholder="Enter your budget"></label>
              <div class="price-box" id="job-starting-rate"></div>
              <label>Job details<textarea name="details" required placeholder="Describe the work needed"></textarea></label>
              <p class="form-success" id="job-success">Your job has been posted and a suitable worker has been assigned automatically.</p>
              <button class="primary-action" type="submit">Post job</button>
            </form>
          </section>
        </div>
        <section class="panel posted-jobs">
          <h2 class="panel-title">My posted jobs</h2>
          <div class="table-wrap">
            <table>
              <thead><tr><th>Job</th><th>Service</th><th>Location</th><th>Budget</th><th>Status</th></tr></thead>
              <tbody id="customer-jobs"></tbody>
            </table>
          </div>
        </section>
        <section class="panel quick-panel">
          <h2 class="panel-title">Quick booking</h2>
          <p class="quick-intro">Need urgent help? Book a nearby worker for service within 1-2 hours. Check the starting charge before posting your request.</p>
          <form class="quick-grid" id="quick-booking-form">
            <label>Urgent service
              <select name="service" id="quick-service" required>
                <option value="">Select service</option>
                <option>Electrician</option><option>Plumber</option><option>Cleaner</option>
                <option>Carpenter</option><option>Painter</option><option>Appliance Repair</option>
              </select>
            </label>
            <label>Your location<input name="location" required placeholder="Enter service location"></label>
            <label class="full">Describe the issue<textarea name="details" required placeholder="Briefly explain what needs urgent attention"></textarea></label>
            <div class="price-box full" id="quick-price"></div>
            <button class="primary-action full" type="submit">Post quick booking</button>
          </form>
          <div class="booking-status" id="quick-status"></div>
        </section>`;

      populateJobServices();
      document.getElementById("job-service-category").addEventListener("change", showJobStartingRate);
      document.getElementById("customer-job-form").addEventListener("submit", (event) => {
        event.preventDefault();
        const data = new FormData(event.currentTarget);
        const jobs = getCustomerJobs();
        const matchingWorker = getWorkers().find((worker) => worker.service === data.get("category"));
        jobs.unshift({
          title: data.get("title"),
          category: data.get("category"),
          location: data.get("location"),
          budget: data.get("budget"),
          details: data.get("details"),
          assignedWorkerId: matchingWorker ? matchingWorker.id : null,
          status: matchingWorker ? "Worker assigned" : "Finding a worker"
        });
        localStorage.setItem("jobeaseCustomerJobs", JSON.stringify(jobs));
        event.currentTarget.reset();
        document.getElementById("job-success").style.display = "block";
        renderCustomerJobs();
      });
      document.getElementById("quick-service").addEventListener("change", showQuickPrice);
      document.getElementById("quick-booking-form").addEventListener("submit", startQuickBooking);
      renderCustomerJobs();
    }

    const quickCharges = {
      Electrician: 499, Plumber: 449, Cleaner: 399, Carpenter: 549,
      Painter: 599, "Appliance Repair": 649
    };

    const serviceRates = {
      "Kambali Bai / Maid":299,"Maid":299,"House Cleaning":699,"Deep Cleaning":1499,"Bathroom Cleaning":399,"Kitchen Cleaning":599,"Sofa Cleaning":499,"Carpet Cleaning":449,"Office Cleaning":999,
      Plumber:399,Electrician:399,Carpenter:499,Painter:599,Welder:599,Mason:549,"Tile Worker":599,"POP Worker":649,
      "AC Repair":599,"Refrigerator Repair":499,"Washing Machine Repair":499,"TV Repair":449,"Microwave Repair":449,"Water Purifier Repair":399,"Geyser Repair":449,
      "Bike Repair":349,"Bike Washing":199,"Puncture Repair":149,"Car Repair":699,"Car Washing":399,"Car Detailing":1499,"Towing Service":999,"Battery Jump Start":449,
      "Home Nurse":999,Caretaker:799,"Elder Care":799,Babysitter:699,"Ambulance Booking":999,Locksmith:449,"Female Driver":899,
      "Website Developer":2999,"Graphic Designer":999,Accountant:999,"Security Guard":799,"Property Inspection":999,"Passport Assistance":499,"Resume Writing":499,
      "Vehicle Rent":999,"Equipment Rent":799,"Generator Rent":999,"Camera Rent":799,"Tractor Rental":1499,"Harvester Rental":2999,"Farm Labour":699,
      "AI Assistant Setup":1499,"AI Content Creation":999,"AI Training":1499,"CCTV Installation":999,"Smart Device Setup":699,"Home Automation":1999
    };

    function showJobStartingRate() {
      const service = document.getElementById("job-service-category").value;
      const box = document.getElementById("job-starting-rate");
      const rate = serviceRates[service] || 499;
      if (!service) {
        box.style.display = "none";
        return;
      }
      box.innerHTML = `<strong>₹${rate}</strong>Estimated starting rate for ${service}. You can adjust your budget based on the job details.`;
      box.style.display = "block";
    }

    const jobServiceGroups = {
      "Home Cleaning": ["Kambali Bai / Maid","House Cleaning","Deep Cleaning","Bathroom Cleaning","Kitchen Cleaning","Sofa Cleaning","Carpet Cleaning","Office Cleaning"],
      "Repair Services": ["Plumber","Electrician","Carpenter","Painter","Welder","Mason","Tile Worker","POP Worker"],
      "Appliance Repair": ["AC Repair","Refrigerator Repair","Washing Machine Repair","TV Repair","Microwave Repair","Water Purifier Repair","Geyser Repair"],
      "Automobile Services": ["Bike Repair","Bike Washing","Puncture Repair","Bike Pickup Service","Car Repair","Car Washing","Car Detailing","Driver on Demand","Car Pickup Service","Towing Service","Battery Jump Start","Emergency Fuel Delivery"],
      "Labour Jobs": ["Construction Labour","Factory Labour","Loading Unloading","Packers Movers Helper","Warehouse Worker","Daily Wage Labour"],
      "Delivery Jobs": ["Food Delivery","Grocery Delivery","Parcel Delivery","Courier Delivery","Medicine Delivery"],
      "Driver Services": ["Personal Driver","Monthly Driver","Truck Driver","Taxi Driver","School Van Driver","Delivery Driver"],
      "Beauty & Wellness": ["Beautician","Makeup Artist","Hair Stylist","Nail Artist","Bridal Makeup","Massage Therapist","Yoga Trainer","Gym Trainer"],
      "Education": ["Home Tutor","Online Tutor","Spoken English Teacher","Computer Teacher","Music Teacher","Dance Teacher"],
      "IT & Freelancing": ["Data Entry","Content Writing","Graphic Designer","Video Editor","Website Developer","Mobile App Developer","Digital Marketing","SEO Expert"],
      "Part-Time Jobs": ["Store Helper","Cashier","Receptionist","Promoter","Event Staff","Sales Executive","Telecaller","Delivery Boy","Packing Staff"],
      "Work From Home": ["Customer Support","Chat Support","Content Writer","Virtual Assistant","Online Seller","Social Media Manager"],
      "Event Services": ["Photographer","Videographer","DJ","Singer","Event Host","Decorator","Catering Staff","Wedding Planner"],
      "Pet Services": ["Dog Walker","Pet Grooming","Pet Sitting","Pet Training"],
      "Healthcare Support": ["Home Nurse","Caretaker","Elder Care","Patient Attendant","Physiotherapist Visit"],
      "Business Support": ["Office Boy","Accountant","Data Operator","Security Guard","Office Cleaner"],
      "Professional Jobs": ["Architect","Interior Designer","Civil Engineer","Electric Engineer","Mechanical Technician"],
      "Social Companion Services": ["Movie Companion","Travel Companion","Event Companion","Shopping Companion","Senior Citizen Companion","Conversation Companion"],
      "Future & Smart Services": ["AI Assistant Setup","AI Content Creation","AI Training","CCTV Installation","Smart Device Setup","Home Automation"],
      "Security & Investigation": ["Private Investigator / Detective","Background Verification","Employee Verification","Tenant Verification","Matrimonial Verification","Missing Person Investigation","Fraud Investigation Support","Corporate Investigation"],
      "Security Services": ["Security Guard","Bouncer","Event Security","CCTV Monitoring","Security Supervisor","Personal Security Escort"],
      "Emergency Services": ["Ambulance Booking","Roadside Assistance","Emergency Electrician","Emergency Plumber","Locksmith","Water Tanker Booking"],
      "Senior Citizen Services": ["Elder Companion","Hospital Visit Assistance","Medicine Pickup","Home Care Assistant","Daily Check-In Service"],
      "Women Support Services": ["Female Driver","Female Security Escort","Babysitter","Caretaker","Women-only Home Services"],
      "Property Services": ["Property Inspection","Property Manager","Rent Collection Agent","Tenant Search","Property Photography"],
      "Agriculture Services": ["Farm Labour","Tractor Rental","Harvester Rental","Irrigation Technician","Dairy Worker","Animal Care Worker"],
      "Religious & Cultural Services": ["Pandit Booking","Pujan Services","Wedding Ritual Services","Bhajan/Kirtan Group","Event Decoration"],
      "Documentation Services": ["Passport Assistance","PAN Card Assistance","Aadhaar Update Assistance","Government Form Filling","GST Registration Support","Income Tax Filing"],
      "Creative Services": ["Photographer","Videographer","Drone Operator","Graphic Designer","Content Creator","Social Media Manager"],
      "Rental Services": ["House Rent","Room Rent","Vehicle Rent","Equipment Rent","Generator Rent","Camera Rent"],
      "Education & Career": ["Resume Writing","Interview Preparation","Career Counseling","Language Trainer","Computer Training"],
      "Healthcare & Wellness": ["Home Nurse","Physiotherapist","Yoga Trainer","Dietitian","Medical Attendant"],
      "Household Support": ["Maid","Cook","Babysitter","Laundry Service","Ironing Service"],
      "Marketplace": ["Tools","Equipment","Materials"]
    };

    function populateJobServices() {
      const select = document.getElementById("job-service-category");
      Object.entries(jobServiceGroups).forEach(([group, services]) => {
        const options = services.map((service) => `<option>${service}</option>`).join("");
        select.insertAdjacentHTML("beforeend", `<optgroup label="${group}">${options}</optgroup>`);
      });
    }

    function showQuickPrice() {
      const service = document.getElementById("quick-service").value;
      const box = document.getElementById("quick-price");
      if (!service) {
        box.style.display = "none";
        return;
      }
      box.innerHTML = `<strong>₹${quickCharges[service]}</strong>Starting charge for quick ${service.toLowerCase()} service. Any additional work will be confirmed before starting.`;
      box.style.display = "block";
    }

    function startQuickBooking(event) {
      event.preventDefault();
      const data = new FormData(event.currentTarget);
      const service = data.get("service");
      const status = document.getElementById("quick-status");
      status.style.display = "block";
      status.innerHTML = `<div class="loader"></div><h3>Searching for a nearby worker...</h3><p>We are finding an available ${service.toLowerCase()} professional for your location.</p>`;
      event.currentTarget.querySelector("button").disabled = true;

      setTimeout(() => assignQuickWorker(service, data.get("location")), 1800);
    }

    function assignQuickWorker(service, location) {
      const worker = getWorkers().find((item) => item.service === service) || getWorkers()[0];
      const status = document.getElementById("quick-status");
      const otp = String(Math.floor(1000 + Math.random() * 9000));
      localStorage.setItem("jobeaseQuickBooking", JSON.stringify({ service, location, workerId: worker.id, otp, status: "Worker assigned" }));
      status.innerHTML = `
        <h3>Worker assigned successfully</h3>
        <p><strong>${worker.name}</strong> has accepted your quick booking.</p>
        <p>Service: ${service}<br>Location: ${location}<br>Estimated arrival: <strong>45 minutes</strong></p>
        <p>Share this OTP only after the worker arrives:</p>
        <span class="otp">${otp}</span>
        <p>The worker must enter this OTP before work can start.</p>
        <button class="primary-action start-work" id="start-work-demo" type="button">Confirm worker arrival and start work</button>`;
      const button = document.getElementById("start-work-demo");
      button.style.display = "inline-block";
      button.addEventListener("click", () => {
        const booking = JSON.parse(localStorage.getItem("jobeaseQuickBooking"));
        booking.status = "Work started";
        localStorage.setItem("jobeaseQuickBooking", JSON.stringify(booking));
        status.innerHTML = `<h3>Work started</h3><p>OTP verified successfully. Your ${service.toLowerCase()} service is now in progress.</p>`;
      });
    }
    if (!views[role]) {
      window.location.replace("login.html");
    } else {
      const view = views[role];
      document.getElementById("role-tag").textContent = role + " access";
      document.getElementById("title").textContent = view.title;
      document.getElementById("subtitle").textContent = view.subtitle;
      document.getElementById("cards").innerHTML = view.cards
        .map(([title, text]) => `<article class="card"><h2>${title}</h2><p>${text}</p></article>`)
        .join("");
      if (role === "admin") renderAdmin();
      if (role === "worker") renderWorker();
      if (role === "customer") renderCustomer();
    }

    document.getElementById("close-modal").addEventListener("click", () => document.getElementById("worker-modal").close());
    document.getElementById("logout").addEventListener("click", () => {
      localStorage.removeItem("jobeaseRole");
      window.location.href = "login.html";
    });
  </script>
</body>
</html>
